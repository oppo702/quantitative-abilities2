.back-btn {

.back-btn:hover {

  <script>
// ============ UTILITIES ============
const toAr = n => n.toString().replace(/\d/g, d=>'٠١٢٣٤٥٦٧٨٩'[d]);

function showToast(msg, color) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.background = color || '#e94560';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ============ STATE ============
let currentUser = null;
let isAdmin = false;
let currentPage = 'home';
let currentTest = null;
let answers = {};
let testSubmitted = false;
let allResults = [];
let isLoadingResults = false;

// ============ DATA SDK HANDLER ============

  onDataChanged(data) {
    allResults = data;
    // Update UI if admin page is open
    if (currentPage === 'admin') {
      renderAdmin(document.getElementById('mainContent'));
    }

};

// ============ TOPICS DATA ============
const topics = [
  {id:'arithmetic',name:'الحساب',icon:'🔢',
   guide:'<h3>دليل قسم الحساب</h3><p>الحساب هو أساس الرياضيات ويشمل العمليات الأربع: <b>الجمع والطرح والضرب والقسمة</b>.</p><ul><li>ترتيب العمليات: الأقواس أولاً، ثم الأُسس، ثم الضرب والقسمة، ثم الجمع والطرح (PEMDAS)</li><li>الأعداد الزوجية: تقبل القسمة على ٢ (مثل ٢، ٤، ٦)</li><li>الأعداد الفردية: لا تقبل القسمة على ٢ (مثل ١، ٣، ٥)</li><li>الأعداد الأولية: لها قاسمان فقط: ١ والعدد نفسه</li><li>القيمة المطلقة |x|: المسافة من الصفر (دائماً موجبة)</li></ul>'},
  {id:'algebra',name:'الجبر',icon:'📐',
   guide:'<h3>دليل قسم الجبر</h3><p>الجبر يتعامل مع <b>المتغيرات والمعادلات</b> لإيجاد القيم المجهولة.</p><ul><li>المعادلة الخطية: أس + ب = ج</li><li>حل المعادلة: نعزل المتغير في طرف واحد</li><li>الفرق بين مربعين: أ² - ب² = (أ+ب)(أ-ب)</li><li>المتطابقات: (أ+ب)² = أ² + ٢أب + ب²</li></ul>'},
  {id:'geometry',name:'الهندسة',icon:'📏',
   guide:'<h3>دليل قسم الهندسة</h3><p>الهندسة تدرس <b>الأشكال والمساحات والحجوم</b>.</p><ul><li>مساحة المربع = الضلع × الضلع</li><li>مساحة المستطيل = الطول × العرض</li><li>مساحة الدائرة = π × نق²</li><li>محيط الدائرة = ٢ × π × نق</li><li>مساحة المثلث = ½ × القاعدة × الارتفاع</li></ul>'},

// ============ QUESTION GENERATORS ============
function generateQuestions(topicId, modelNum) {
  const seed = topicId.length * 100 + modelNum;
  const qs = [];
  for (let i = 0; i < 20; i++) {
    const q = makeQuestion(topicId, seed + i * 7);
    q.id = i;
    qs.push(q);
  }
  return qs;
}

function makeQuestion(topic, s) {
  const r = (min, max) => min + ((s = s * 131 + 17) >>> 0) % (max - min + 1);
  switch (topic) {
    case 'arithmetic': return makeArithmetic(r);
    case 'algebra': return makeAlgebra(r);
    case 'geometry': return makeGeometry(r);
    case 'statistics': return makeStatistics(r);
    case 'comparison': return makeComparison(r);
    case 'word': return makeWord(r);
    default: return makeArithmetic(r);
  }
}

function makeArithmetic(r){
  const type = r(0, 5);
  if (type === 0) { const a = r(2, 20), b = r(2, 20); const ans = a + b; const w1 = ans + r(1, 5), w2 = ans - r(1, 3), w3 = ans + r(6, 10); return { text: `ما ناتج ${toAr(a)} + ${toAr(b)} ؟`, options: [toAr(ans), toAr(w1), toAr(Math.abs(w2)), toAr(w3)], correct: 0, hasImage: r(0, 3) === 0, imageDesc: 'عملية جمع' }; }
  if (type === 1) { const a = r(10, 50), b = r(2, a - 1); const ans = a - b; const w1 = ans + r(1, 4), w2 = Math.abs(ans - r(1, 3)), w3 = ans + r(5, 9); return { text: `ما ناتج ${toAr(a)} - ${toAr(b)} ؟`, options: [toAr(ans), toAr(w1), toAr(w2), toAr(w3)], correct: 0, hasImage: false }; }
  if (type === 2) { const a = r(2, 12), b = r(2, 12); const ans = a * b; const w1 = ans + r(1, 5), w2 = Math.abs(ans - r(2, 6)), w3 = ans + r(7, 12); return { text: `ما ناتج ${toAr(a)} × ${toAr(b)} ؟`, options: [toAr(ans), toAr(w1), toAr(w2), toAr(w3)], correct: 0, hasImage: r(0, 4) === 0, imageDesc: 'عملية ضرب' }; }
  if (type === 3) { const b = r(2, 12), ans = r(2, 12), a = b * ans; const w1 = ans + r(1, 3), w2 = Math.abs(ans - r(1, 2)), w3 = ans + r(4, 7); return { text: `ما ناتج ${toAr(a)} ÷ ${toAr(b)} ؟`, options: [toAr(ans), toAr(w1), toAr(w2), toAr(w3)], correct: 0, hasImage: false }; }
  if (type === 4) { const a = r(1, 20); return { text: `ما القيمة المطلقة |${toAr(-a)}| ؟`, options: [toAr(a), toAr(-a), toAr(0), toAr(a + 1)], correct: 0, hasImage: r(0, 3) === 0, imageDesc: 'القيمة المطلقة' }; }
  const a = r(2, 15), b = r(2, 10), c = r(2, 8); const ans = a + b * c; const w1 = ans + r(1, 5), w2 = Math.abs(ans - r(2, 6)), w3 = (a + b) * c; return { text: `ما ناتج ${toAr(a)} + ${toAr(b)} × ${toAr(c)} ؟`, options: [toAr(ans), toAr(w1), toAr(w2), toAr(w3)], correct: 0, hasImage: false };
}

function makeAlgebra(r){
  const type = r(0, 3);
  if (type === 0) { const ans = r(2, 15), b = r(1, 20); const a_coeff = r(2, 6); const total = a_coeff * ans + b; return { text: `إذا كان ${toAr(a_coeff)}س + ${toAr(b)} = ${toAr(total)}، فما قيمة س؟`, options: [toAr(ans), toAr(ans + 1), toAr(ans - 1), toAr(ans + 2)], correct: 0, hasImage: r(0, 3) === 0, imageDesc: 'معادلة جبرية' }; }
  if (type === 1) { const a = r(2, 10); const sq = a * a; return { text: `ما قيمة جذر ${toAr(sq)}؟`, options: [toAr(a), toAr(a + 1), toAr(a - 1), toAr(a + 2)], correct: 0, hasImage: false }; }
  if (type === 2) { const a = r(1, 8), b = r(1, 8); return { text: `إذا كان أ + ب = ${toAr(a + b)} و أ - ب = ${toAr(a - b)}، فما قيمة أ؟`, options: [toAr(a), toAr(b), toAr(a + 1), toAr(b + 1)], correct: 0, hasImage: r(0, 4) === 0, imageDesc: 'نظام معادلات' }; }
  const a = r(2, 9); const cube = a * a * a; return { text: `ما قيمة ${toAr(a)}³؟`, options: [toAr(cube), toAr(cube + a), toAr(a * a), toAr(cube - a)], correct: 0, hasImage: false };
}

function makeGeometry(r){
  const type = r(0, 3);
  if (type === 0) { const s = r(2, 15); const area = s * s; return { text: `مربع طول ضلعه ${toAr(s)} سم، ما مساحته؟`, options: [toAr(area) + ' سم²', toAr(area + s) + ' سم²', toAr(s * 4) + ' سم²', toAr(area - s) + ' سم²'], correct: 0, hasImage: true, imageDesc: 'مربع بضلع ' + toAr(s) }; }
  if (type === 1) { const l = r(3, 15), w = r(2, l); const area = l * w; return { text: `مستطيل طوله ${toAr(l)} وعرضه ${toAr(w)}، ما مساحته؟`, options: [toAr(area) + ' سم²', toAr(l + w) + ' سم²', toAr(2 * (l + w)) + ' سم²', toAr(area + l) + ' سم²'], correct: 0, hasImage: true, imageDesc: 'مستطيل' }; }
  if (type === 2) { const rad = r(2, 10); const area = Math.round(3.14 * rad * rad); return { text: `دائرة نصف قطرها ${toAr(rad)} سم، ما مساحتها تقريباً؟ (π≈٣٫١٤)`, options: [toAr(area) + ' سم²', toAr(area + 10) + ' سم²', toAr(Math.round(2 * 3.14 * rad)) + ' سم²', toAr(area - 5) + ' سم²'], correct: 0, hasImage: true, imageDesc: 'دائرة' }; }
  const b = r(3, 15), h = r(2, 12); const area = Math.round(0.5 * b * h); return { text: `مثلث قاعدته ${toAr(b)} وارتفاعه ${toAr(h)}، ما مساحته؟`, options: [toAr(area) + ' سم²', toAr(b * h) + ' سم²', toAr(area + b) + ' سم²', toAr(area - 2) + ' سم²'], correct: 0, hasImage: true, imageDesc: 'مثلث' };
}

function makeStatistics(r){
  const type = r(0, 2);
  if (type === 0) { const nums = [r(2, 20), r(2, 20), r(2, 20), r(2, 20), r(2, 20)]; const sum = nums.reduce((a, b) => a + b, 0); const avg = sum / 5; const avgR = Math.round(avg * 10) / 10; const numsAr = nums.map(toAr).join('، '); return { text: `ما المتوسط الحسابي للأعداد: ${numsAr}؟`, options: [toAr(avgR), toAr(avgR + 1), toAr(avgR - 1), toAr(Math.round(avg) + 2)], correct: 0, hasImage: r(0, 3) === 0, imageDesc: 'بيانات إحصائية' }; }
  if (type === 1) { const nums = [r(1, 20), r(1, 20), r(1, 20), r(1, 20), r(1, 20)].sort((a, b) => a - b); const median = nums[2]; const numsAr = nums.map(toAr).join('، '); return { text: `ما الوسيط للأعداد: ${numsAr}؟`, options: [toAr(median), toAr(nums[1]), toAr(nums[3]), toAr(nums[0])], correct: 0, hasImage: false }; }
  const nums = [r(1, 10), r(1, 10), r(1, 10), r(1, 10), r(1, 10)].sort((a, b) => a - b); const range = nums[4] - nums[0]; const numsAr = nums.map(toAr).join('، '); return { text: `ما المدى للأعداد: ${numsAr}؟`, options: [toAr(range), toAr(range + 1), toAr(range - 1), toAr(nums[4])], correct: 0, hasImage: false };
}

function makeComparison(r){
  const a = r(2, 50), b = r(2, 50);
  let correctIdx;
  if (a > b) correctIdx = 0; else if (b > a) correctIdx = 1; else correctIdx = 2;
  return { text: `قارن بين:<br>العمود (أ): ${toAr(a * r(1, 3))}<br>العمود (ب): ${toAr(b * r(1, 3))}`, options: ['القيمة في (أ) أكبر', 'القيمة في (ب) أكبر', 'القيمتان متساويتان', 'لا يمكن التحديد'], correct: correctIdx, hasImage: r(0, 3) === 0, imageDesc: 'مقارنة بين عمودين' };
}

function makeWord(r){
  const type = r(0, 3);
  if (type === 0) { const price = r(5, 50), qty = r(2, 10); const total = price * qty; return { text: `اشترى أحمد ${toAr(qty)} كتب، سعر الكتاب الواحد ${toAr(price)} ريال. ما المبلغ الكلي؟`, options: [toAr(total) + ' ريال', toAr(total + price) + ' ريال', toAr(total - price) + ' ريال', toAr(price) + ' ريال'], correct: 0, hasImage: r(0, 3) === 0, imageDesc: 'مسألة كلامية' }; }
  if (type === 1) { const speed = r(40, 120), time = r(1, 8); const dist = speed * time; return { text: `سيارة تسير بسرعة ${toAr(speed)} كم/س لمدة ${toAr(time)} ساعات. ما المسافة المقطوعة؟`, options: [toAr(dist) + ' كم', toAr(dist + speed) + ' كم', toAr(speed) + ' كم', toAr(dist - time) + ' كم'], correct: 0, hasImage: false }; }
  if (type === 2) { const total = r(20, 100), part = r(5, total - 5); const rem = total - part; return { text: `مع سارة ${toAr(total)} ريال، أنفقت ${toAr(part)} ريال. كم بقي معها؟`, options: [toAr(rem) + ' ريال', toAr(total) + ' ريال', toAr(part) + ' ريال', toAr(rem + 5) + ' ريال'], correct: 0, hasImage: false }; }
  const workers = r(2, 8), days = r(3, 15); const totalWork = workers * days; const newWorkers = workers + r(1, 4); const newDays = Math.round(totalWork / newWorkers); return { text: `إذا أنجز ${toAr(workers)} عمال مشروعاً في ${toAr(days)} أيام، فكم يوماً يحتاج ${toAr(newWorkers)} عمال لإنجاز نفس المشروع؟`, options: [toAr(newDays) + ' أيام', toAr(days) + ' أيام', toAr(newDays + 2) + ' أيام', toAr(newDays - 1) + ' أيام'], correct: 0, hasImage: false };
}

// ============ COMPREHENSIVE TEST ============
function generateComprehensiveTest(modelNum){
  const qs = [];
  const perTopic = 5;
  topics.forEach(t => {
    for (let i = 0; i < perTopic; i++) {
      const seed = t.id.length * 1000 + modelNum * 100 + i * 13;
      const q = makeQuestion(t.id, seed + i * 31);
      q.id = qs.length;
      q.topicName = t.name;
      qs.push(q);
    }
  });
  return qs;
}

// ============ LOGIN ============
function handleLogin(e) {
  e.preventDefault();
  const name = document.getElementById('loginName').value.trim();
  const pass = document.getElementById('loginPass').value;
  const grade = document.getElementById('loginGrade').value;

  if (!name) {
    showToast('أدخل اسمك', '#e94560');
    return;
  }

  if (pass !== '2010') {
    document.getElementById('loginError').style.display = 'block';
    return;
  }

  document.getElementById('loginError').style.display = 'none';

  if (name === 'Math') {
    isAdmin = true;
    currentUser = { name: 'المدير', grade: '' };
  } else {
    isAdmin = false;
    currentUser = { name, grade };
  }

  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('mainApp').style.display = 'flex';
  document.getElementById('userNameDisplay').textContent = isAdmin ? '🛡️ لوحة المدير' : currentUser.name;

  buildNav();
  navigateTo('home');
}

function logout() {
  currentUser = null;
  isAdmin = false;
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('loginName').value = '';
  document.getElementById('loginPass').value = '';
}

function buildNav() {
  const nav = document.getElementById('navLinks');
  let links = [];

  if (isAdmin) {
    links = [
      { id: 'home', icon: '📊', label: 'الرئيسية' },
      { id: 'admin', icon: '👥', label: 'نتائج الطلاب' }
    ];
  } else {
    links = [
      { id: 'home', icon: '🏠', label: 'الرئيسية' },
      { id: 'pretest', icon: '📋', label: 'الاختبار القبلي' }
    ];
    topics.forEach(t => links.push({ id: 'topic_' + t.id, icon: t.icon, label: t.name }));
    links.push({ id: 'comprehensive', icon: '🏆', label: 'اختبار شامل' });
  }

  nav.innerHTML = links.map(l => `<div class="nav-item" data-page="${l.id}" onclick="navigateTo('${l.id}')">${l.icon} ${l.label}</div>`).join('');
}

function navigateTo(page) {
  currentPage = page;
  answers = {};
  testSubmitted = false;
  currentTest = null;

  document.querySelectorAll('.nav-item[data-page]').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });

  const mc = document.getElementById('mainContent');

  if (page === 'home') renderHome(mc);
  else if (page === 'admin') renderAdmin(mc);
  else if (page === 'pretest') renderPreTest(mc);
  else if (page === 'comprehensive') renderComprehensive(mc);
  else if (page.startsWith('topic_')) renderTopic(mc, page.replace('topic_', ''));

  mc.scrollTop = 0;
}

      ${[1,2,3,4,5].map(i => `<div class="topic-card" onclick="startComprehensiveTest(${i})" style="text-align: center;">
        <div class="topic-icon" style="font-size: 48px;">${toAr(i)}</div>
        <h3>النموذج ${toAr(i)}</h3>
        <p>٣٠ سؤال</p>
      </div>`).join('')}
    </div>
  </div>`;
}

function startComprehensiveTest(num) {
  currentTest = {
    type: 'comprehensive',
    modelNum: num,
    questions: generateComprehensiveTest(num)
  };
  answers = {};
  testSubmitted = false;
  renderTest(document.getElementById('mainContent'));
}

function renderPreTest(mc) {
  currentTest = {
    type: 'pretest',
    modelNum: 1,
    questions: preTestQuestions
  };
  answers = {};
  testSubmitted = false;
  renderTest(document.getElementById('mainContent'));
}

// ============ TEST RENDERER ============
function renderTest(mc) {
  if (!currentTest) return;

  const qs = currentTest.questions;
  let title = '';

  if (currentTest.type === 'pretest') title = 'الاختبار القبلي';
  else if (currentTest.type === 'comprehensive') title = `اختبار شامل - نموذج ${toAr(currentTest.modelNum)}`;
  else title = `${currentTest.topicName} - نموذج ${toAr(currentTest.modelNum)}`;

  const answered = Object.keys(answers).length;
  const pct = Math.round(answered / qs.length * 100);

  let html = `<div class="fade-in">
    <button class="back-btn" onclick="navigateTo('${
      currentTest.type === 'pretest' ? 'pretest' :
      currentTest.type === 'comprehensive' ? 'comprehensive' :
      'topic_' + currentTest.topicId
    }')">← رجوع</button>

    <div class="test-header">
      <h1>${title}</h1>
      <p>${toAr(qs.length)} أسئلة</p>
    </div>

    <div class="progress-container">
      <div class="progress-bar">
        <div class="progress-fill" style="width: ${pct}%"></div>
      </div>
      <div class="progress-text">${toAr(answered)}/${toAr(qs.length)}</div>
    </div>`;

  qs.forEach((q, idx) => {
    const selected = answers[q.id];
    const isAnswered = selected !== undefined;

    html += `<div class="question-card">
      <div class="question-number">${toAr(idx + 1)}</div>
      <div class="question-text">${q.text}</div>
      ${q.topicName ? `<div class="question-meta">${q.topicName}</div>` : ''}
      ${q.hasImage ? `<div class="image-placeholder">📷 ${q.imageDesc || 'صورة توضيحية'}</div>` : ''}
      <div class="options-grid">`;

    q.options.forEach((opt, oi) => {
      let cls = 'option-btn';
      if (testSubmitted) {
        if (oi === q.correct) cls += ' correct';
        else if (selected === oi && oi !== q.correct) cls += ' wrong';
      } else if (selected === oi) cls += ' selected';

      html += `<div class="${cls}" onclick="selectAnswer(${q.id}, ${oi})">${'أبجد'[oi]}) ${opt}</div>`;
    });

    html += `</div></div>`;
  });

  if (!testSubmitted) {
    html += `<button class="submit-btn" onclick="submitTest()">تسليم الاختبار</button>`;
  } else {
    const score = calcScore();
    const color = score.pct >= 70 ? '#22c55e' : score.pct >= 50 ? '#eab308' : '#ef4444';
    const message = score.pct >= 90 ? 'ممتاز! 🌟' :
                   score.pct >= 70 ? 'جيد جداً 👏' :
                   score.pct >= 50 ? 'جيد، واصل التحسن 💪' :
                   'تحتاج مزيد من المراجعة 📚';

    html += `<div class="result-box">
      <div class="result-score" style="color: ${color};">${toAr(score.pct)}٪</div>
      <div class="result-details">${toAr(score.correct)} من ${toAr(score.total)}</div>
      <div class="result-message">${message}</div>
    </div>`;
  }

  html += `</div>`;
  mc.innerHTML = html;
}

function selectAnswer(qid, oi) {
  if (testSubmitted) return;
  answers[qid] = oi;
  renderTest(document.getElementById('mainContent'));
}

function calcScore() {
  const qs = currentTest.questions;
  let correct = 0;
  qs.forEach(q => {
    if (answers[q.id] === q.correct) correct++;
  });
  return { correct, total: qs.length, pct: Math.round(correct / qs.length * 100) };
}

function submitTest() {
  if (!currentTest) return;
  testSubmitted = true;
  const score = calcScore();

  // Save result via Data SDK
  if (currentUser && !isAdmin) {
    const result = {
      student_name: currentUser.name,
      student_grade: currentUser.grade || '',
      test_type: currentTest.type,
      test_name: currentTest.type === 'pretest' ? 'الاختبار القبلي' :
                 currentTest.type === 'comprehensive' ? 'شامل ' + currentTest.modelNum :
                 (currentTest.topicName + ' - ' + currentTest.modelNum),
      score: score.correct,
      total: score.total,
      percentage: score.pct,
      date: new Date().toLocaleString('ar-SA')
    };

    isLoadingResults = true;
    window.dataSdk.create(result).then(createResult => {
      isLoadingResults = false;
      if (createResult.isOk) {
        showToast('تم حفظ النتيجة بنجاح ✓', '#22c55e');
      } else {
        showToast('خطأ في حفظ النتيجة', '#ef4444');
      }
    });
  }

  renderTest(document.getElementById('mainContent'));
  showToast(`درجتك: ${toAr(score.correct)}/${toAr(score.total)}`, score.pct >= 70 ? '#22c55e' : '#e94560');
}

// ============ ADMIN PANEL ============
function renderAdmin(mc) {
  let html = `<div class="fade-in">
    <button class="back-btn" onclick="navigateTo('home')">← رجوع</button>
    <div class="home-header">
      <h1>📊 نتائج الطلاب</h1>
      <p>جميع نتائج الاختبارات</p>
    </div>`;

  if (allResults.length === 0) {
    html += `<div class="empty-state">
      <p>لا توجد نتائج بعد</p>
      <p>ستظهر النتائج هنا عندما يُكمل الطلاب اختباراتهم</p>
    </div>`;
  } else {
    html += `<div class="results-table">
      <div class="table-header">
        <div>#</div>
        <div>اسم الطالب</div>
        <div>الصف</div>
        <div>الاختبار</div>
        <div>الدرجة</div>
        <div>النسبة</div>
        <div>التاريخ</div>
      </div>`;

    allResults.forEach((r, i) => {
      const scoreClass = r.percentage >= 70 ? 'score-good' :
                        r.percentage >= 50 ? 'score-ok' : 'score-low';

      html += `<div class="table-row">
        <div>${toAr(i + 1)}</div>
        <div><strong>${r.student_name}</strong></div>
        <div>${toAr(r.student_grade || '-')}</div>
        <div>${r.test_name}</div>
        <div>${toAr(r.score)}/${toAr(r.total)}</div>
        <div class="${scoreClass}">${toAr(r.percentage)}٪</div>
        <div style="font-size: 11px;">${r.date}</div>
      </div>`;
    });

    html += `</div>`;
  }

  html += `</div>`;
  mc.innerHTML = html;
}

// ============ INITIALIZATION ============
async function initializeApp() {
  // Load saved results from localStorage first
  const saved = localStorage.getItem('testResults');
  if (saved) {
    try {
      allResults = JSON.parse(saved);
    } catch (e) {
      allResults = [];
    }
  }

  // Initialize Data SDK
  const initResult = await window.dataSdk.init(dataHandler);
  if (!initResult.isOk) {
    console.error('Failed to initialize Data SDK');
  }
}

document.addEventListener('DOMContentLoaded', () => {
  initializeApp();
});
